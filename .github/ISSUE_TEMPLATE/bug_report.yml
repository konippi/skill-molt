name: Bug Report
description: Report a problem with skill-molt
labels: [bug]
body:
  - type: input
    id: agent
    attributes:
      label: Agent
      description: Which agent were you using? (e.g., Claude Code, Kiro CLI, OpenClaw, Codex, Cursor, Gemini CLI)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: skill-content
    attributes:
      label: Generated skill content
      description: If skill-molt produced incorrect output, paste the generated SKILL.md here.
      render: markdown
    validations:
      required: false
